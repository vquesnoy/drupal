name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Build
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'application
        run: echo "Build en cours..."

  # ─────────────────────────────────────────
  # JOB 2 : Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancement des tests
        run: echo "Tests en cours..."

  # ─────────────────────────────────────────
  # JOB 3 : Deploy
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement
        run: echo "Déploiement en cours..."
