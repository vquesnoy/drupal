name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 : Build
  # ─────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Vérifier la version
        run: node --version
  # ─────────────────────────────────────────
  # JOB 2 : Test
  # ─────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Lancement des tests
        run: echo "Tests en cours..."

  # ─────────────────────────────────────────
  # JOB 3 : Deploy
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement
        run: echo "Déploiement en cours..."
